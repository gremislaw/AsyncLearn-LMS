apiVersion: v1
kind: Service
metadata:
  name: {{ include "asynclearn.fullname" . }}-backend
  labels:
    app: {{ include "asynclearn.name" . }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "asynclearn.name" . }}
    component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asynclearn.fullname" . }}-frontend
  labels:
    app: {{ include "asynclearn.name" . }}
    component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "asynclearn.name" . }}
    component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: {{ include "asynclearn.name" . }}
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: {{ include "asynclearn.name" . }}
    component: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    app: {{ include "asynclearn.name" . }}
    component: mongo
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mongo.port }}
      targetPort: 27017
      protocol: TCP
      name: mongo
  selector:
    app: {{ include "asynclearn.name" . }}
    component: mongo
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: {{ include "asynclearn.name" . }}
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: {{ include "asynclearn.name" . }}
    component: redis
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  labels:
    app: {{ include "asynclearn.name" . }}
    component: kafka
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kafka.port }}
      targetPort: 9092
      protocol: TCP
      name: kafka
  selector:
    app: {{ include "asynclearn.name" . }}
    component: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  labels:
    app: {{ include "asynclearn.name" . }}
    component: rabbitmq
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.rabbitmq.port }}
      targetPort: 5672
      protocol: TCP
      name: rabbitmq
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: rabbitmq-management
  selector:
    app: {{ include "asynclearn.name" . }}
    component: rabbitmq
